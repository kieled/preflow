name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun test --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish changed packages
        run: |
          publish_if_needed() {
            local dir=$1
            local name=$(node -p "require('./$dir/package.json').name")
            local local_ver=$(node -p "require('./$dir/package.json').version")
            local npm_ver=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

            if [ "$local_ver" = "$npm_ver" ]; then
              echo "⏭ $name@$local_ver already published, skipping"
            else
              echo "📦 Publishing $name@$local_ver (npm has $npm_ver)"
              cd "$dir" && npm publish --access public && cd -
            fi
          }

          publish_if_needed packages/core
          publish_if_needed packages/prose
          publish_if_needed packages/react
          publish_if_needed packages/vue
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
